<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký – TravelViet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="../index.html" class="logo"><span class="logo-plane">✈</span> TravelViet</a>
        <ul class="nav-menu" id="navMenu">
            <li><a href="../index.html">Trang chủ</a></li>
            <li><a href="tours.html">Tour du lịch</a></li>
            <li><a href="login.html" class="nav-btn-login">Đăng nhập</a></li>
            <li><a href="register.html" class="nav-btn-register active">Đăng ký</a></li>
        </ul>
        <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-card" style="max-width:500px;">
        <h2>Tạo tài khoản</h2>
        <p class="auth-sub">Đăng ký để đặt tour và quản lý chuyến đi</p>

        <div id="successMsg" class="alert alert-success" style="display:none;">
            ✅ Đăng ký thành công! <a href="login.html">Đăng nhập ngay</a>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                <div class="form-group">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label class="form-label">Tên đăng nhập *</label>
                    <input type="text" id="username" class="form-control" placeholder="username" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" id="regEmail" class="form-control" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Số điện thoại</label>
                <input type="tel" id="phone" class="form-control" placeholder="090x xxx xxx">
            </div>

            <div class="form-group">
                <label class="form-label">Mật khẩu * <small style="color:var(--gray);font-weight:400;">(tối thiểu 6 ký tự)</small></label>
                <input type="password" id="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required>
            </div>

            <div class="form-group">
                <label class="form-label">Xác nhận mật khẩu *</label>
                <input type="password" id="passwordConfirm" class="form-control" placeholder="Nhập lại mật khẩu" required>
            </div>

            <div style="margin-bottom:20px;font-size:0.85rem;color:var(--gray);">
                <label style="display:flex;gap:8px;align-items:flex-start;cursor:pointer;">
                    <input type="checkbox" id="agreeTerms" required style="margin-top:3px;">
                    <span>Tôi đồng ý với <a href="#" style="color:var(--teal);">Điều khoản dịch vụ</a> và <a href="#" style="color:var(--teal);">Chính sách bảo mật</a></span>
                </label>
            </div>

            <button type="submit" class="btn btn-teal btn-full btn-lg">Đăng ký tài khoản</button>
        </form>

        <div class="auth-footer" style="margin-top:16px;">
            Đã có tài khoản? <a href="login.html" style="color:var(--teal);font-weight:700;">Đăng nhập</a>
        </div>
    </div>
</div>

<script src="../js/main.js"></script>
<script>
function handleRegister(e) {
    e.preventDefault();
    if (!validateForm('registerForm')) return;

    const email = document.getElementById('regEmail').value;
    const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');

    if (users.find(u => u.email === email)) {
        markError(document.getElementById('regEmail'), 'Email này đã được đăng ký');
        return;
    }

    const newUser = {
        username:  document.getElementById('username').value,
        fullName:  document.getElementById('fullName').value,
        email:     email,
        phone:     document.getElementById('phone').value,
        role:      'user',
        created:   new Date().toLocaleDateString('vi-VN')
    };

    users.push(newUser);
    localStorage.setItem('registeredUsers', JSON.stringify(users));

    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'flex';
}
</script>
</body>
</html>
