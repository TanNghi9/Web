<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – TravelViet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="../index.html" class="logo"><span class="logo-plane">✈</span> TravelViet</a>
        <ul class="nav-menu" id="navMenu">
            <li><a href="../index.html">Trang chủ</a></li>
            <li><a href="tours.html">Tour du lịch</a></li>
            <li><a href="login.html" class="nav-btn-login active">Đăng nhập</a></li>
            <li><a href="register.html" class="nav-btn-register">Đăng ký</a></li>
        </ul>
        <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-card">
        <h2>Đăng nhập</h2>
        <p class="auth-sub">Chào mừng trở lại TravelViet ✈</p>

        <div id="loginAlert" style="display:none;" class="alert alert-error">
            Email hoặc mật khẩu không đúng.
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Mật khẩu *</label>
                <div style="position:relative;">
                    <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required style="padding-right:44px;">
                    <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray);font-size:1rem;">👁</button>
                </div>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:0.85rem;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--gray);">
                    <input type="checkbox" id="rememberMe"> Ghi nhớ đăng nhập
                </label>
                <a href="#" style="color:var(--teal);">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-teal btn-full btn-lg">Đăng nhập</button>
        </form>

        <div class="auth-footer" style="margin-top:20px;">
            Chưa có tài khoản? <a href="register.html" style="color:var(--teal);font-weight:700;">Đăng ký ngay</a>
        </div>

        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);font-size:0.8rem;color:var(--gray);text-align:center;line-height:1.8;">
            <strong>Demo accounts:</strong><br>
            Admin: admin@travelviet.vn / admin123<br>
            User: user@travelviet.vn / user123
        </div>
    </div>
</div>

<script src="../js/main.js"></script>
<script>
// Demo accounts
const DEMO_USERS = [
    { email: 'admin@travelviet.vn', password: 'admin123', name: 'Administrator', role: 'admin' },
    { email: 'user@travelviet.vn',  password: 'user123',  name: 'Nguyễn Văn A',  role: 'user' }
];

function handleLogin(e) {
    e.preventDefault();
    if (!validateForm('loginForm')) return;

    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('password').value;

    const user = DEMO_USERS.find(u => u.email === email && u.password === pass);

    if (user) {
        localStorage.setItem('currentUser', JSON.stringify(user));
        alert('✅ Đăng nhập thành công! Chào mừng ' + user.name);
        window.location.href = user.role === 'admin' ? 'admin.html' : '../index.html';
    } else {
        document.getElementById('loginAlert').style.display = 'flex';
    }
}

function togglePass() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
